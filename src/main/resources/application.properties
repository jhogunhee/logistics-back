# ===== Supabase PostgreSQL =====
# 실제 접속 정보는 커밋하지 않음 → application-local.properties(gitignore 대상)에서 오버라이드
# 최초 설정: application-local.properties.example을 복사해 application-local.properties로 만들고 값 채우기
# 실행 시 -Dspring.profiles.active=local 또는 SPRING_PROFILES_ACTIVE=local 필요
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# JPA
# 스키마는 docs/schema.sql로 직접 관리 → Hibernate는 엔티티-테이블 일치 검증만
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# p6spy SQL 로그
decorator.datasource.p6spy.enable-logging=true
decorator.datasource.p6spy.multiline=true