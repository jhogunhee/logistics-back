services:
  oracle:
    image: gvenzl/oracle-free:23-slim
    container_name: wms-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: wms
      APP_USER_PASSWORD: wms1234
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  oracle-data: